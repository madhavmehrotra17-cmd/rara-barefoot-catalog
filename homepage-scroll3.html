<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARA Barefoot - Community</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
      /* --- Base Style Sheet --- */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
        background-color: #0c0f13; /* Premium dark background */
        color: #ffffff;
        box-sizing: border-box;
      }

      /* --- Persistent Header Menu --- */
      x-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        box-sizing: border-box;
      }

      .header-custom-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 30px 6%;
        background-color: transparent;
        transition: background-color 0.3s ease;
      }

      /* Premium white logo matching high-fashion dark-mode branding */
      .logo-custom img {
        height: 60px;
        width: auto;
        display: block;
        filter: brightness(0) invert(1);
        transition: transform 0.25s ease;
      }

      .logo-custom img:hover {
        transform: scale(1.02);
      }

      .nav-center-custom {
        display: flex;
        align-items: center;
        gap: 50px;
      }

      .nav-link-custom {
        color: #ffffff;
        text-decoration: none;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        transition: opacity 0.25s ease;
      }

      .nav-link-custom:hover {
        opacity: 0.6;
      }

      .nav-right-custom {
        display: flex;
        align-items: center;
        gap: 40px;
      }

      .dropdown-custom-wrapper {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      /* Top invisible bridge to prevent dropdown from closing on hover gap */
      .dropdown-custom-wrapper::after {
        content: '';
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        height: 20px;
      }

      .dropdown-trigger-custom {
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .dropdown-menu-custom {
        display: none;
        position: absolute;
        top: 100%;
        right: 0;
        background-color: rgba(12, 15, 19, 0.75); /* Premium translucent dark glassmorphism */
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        list-style: none;
        padding: 10px 0;
        margin-top: 15px;
        min-width: 180px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        z-index: 100000;
      }

      .dropdown-link-custom {
        display: block;
        padding: 10px 24px;
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: color 0.2s ease, background-color 0.2s ease;
      }

      .dropdown-link-custom:hover {
        color: #ffffff;
        background-color: rgba(255, 255, 255, 0.05);
      }

      .dropdown-custom-wrapper:hover .dropdown-menu-custom {
        display: block;
      }

      .chevron-down-custom {
        font-size: 8px;
        margin-left: 6px;
        display: inline-block;
        opacity: 0.7;
      }

      /* --- Community Section (Barefoot Movement Scroll) --- */
      .community-section {
        height: 100vh;
        width: 100%;
        background-color: #0c0f13;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 140px 8% 40px 8%; /* Generous 140px top padding gives space below header for merging later */
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
      }

      .community-container {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        gap: 60px;
      }

      /* Left Text Panel */
      .community-text-panel {
        flex: 0 0 38%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 28px;
        z-index: 10;
      }

      .community-headline {
        font-family: 'Anton', sans-serif;
        font-size: 72px;
        font-weight: 400;
        text-transform: uppercase;
        line-height: 0.95;
        letter-spacing: 0.05em;
        margin: 0 0 12px 0;
        padding: 0;
        /* Premium custom watercolor linear gradient overlay */
        background: linear-gradient(to right, #8b92f6 0%, #8b92f6 30%, #ffffff 30%, #ffffff 60%, #e6ec9c 60%, #e6ec9c 80%, #8b92f6 80%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      }

      .community-subtitle {
        font-family: 'Roboto Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.65);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        line-height: 1.7;
        max-width: 420px;
        margin: 0;
      }

      .community-cta-row {
        display: flex;
        gap: 20px;
        margin-top: 8px;
      }

      .community-btn {
        font-family: 'Roboto Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        padding: 14px 32px;
        border-radius: 50px;
        border: 1.5px solid #ffffff;
        background-color: transparent;
        color: #ffffff;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        text-decoration: none;
        display: inline-block;
        text-align: center;
      }

      .community-btn:hover {
        background-color: #ffffff;
        color: #000000;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.15);
      }

      /* Right Video Mosaic Grid — 3x2 */
      .community-video-panel {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 16px;
        height: 480px;
        max-height: 60vh;
        min-height: 0;
        z-index: 10;
      }

      .community-video-tile {
        position: relative;
        overflow: hidden;
        border-radius: 16px;
        background-color: #12151a;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .community-video-tile:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      }

      /* 1st video spans both rows to create the tall left column */
      .community-video-tile:nth-child(1) {
        grid-row: 1 / 3;
      }

      .community-video-tile video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* --- Responsive media queries --- */
      @media (max-width: 768px) {
        html, body {
          overflow-y: auto;
          height: auto;
        }

        .community-section {
          height: auto;
          min-height: 100vh;
          padding: 120px 6% 60px 6%;
          overflow-y: visible;
        }

        .community-container {
          flex-direction: column;
          gap: 40px;
        }

        .community-text-panel {
          flex: 0 0 100%;
          align-items: center;
          text-align: center;
        }

        .community-headline {
          font-size: 42px;
          text-align: center;
        }

        .community-subtitle {
          font-size: 10px;
          text-align: center;
        }

        .community-cta-row {
          flex-direction: column;
          gap: 12px;
          width: 80%;
        }

        .community-btn {
          width: 100%;
          box-sizing: border-box;
          padding: 12px 20px;
        }

        .community-video-panel {
          width: 100%;
          height: 380px;
          max-height: 50vh;
          gap: 10px;
        }

        .community-video-tile {
          border-radius: 10px;
        }

        .header-custom-container {
          padding: 20px 6%;
        }

        .nav-center-custom {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Persistent Header Navigation -->
    <x-header class="header">
      <div class="header-custom-container">
        <!-- Left: Logo -->
        <div class="logo-custom">
          <a href="/">
            <img src="https://www.rarabarefoot.in/cdn/shop/files/2_-_Copy_2.png?v=1747044324&width=1500" alt="rarabarefoot">
          </a>
        </div>

        <!-- Center: Core Navigation -->
        <div class="nav-center-custom">
          <!-- Shop Dropdown Wrapper -->
          <div class="dropdown-custom-wrapper">
            <a href="#" class="nav-link-custom dropdown-trigger-custom" onclick="return false;">SHOP <span class="chevron-down-custom">▼</span></a>
            <ul class="dropdown-menu-custom" style="left: 0; right: auto;">
              <li><a href="/collections/the-collection?gender=men" class="dropdown-link-custom">MEN</a></li>
              <li><a href="/collections/the-collection?gender=women" class="dropdown-link-custom">WOMEN</a></li>
            </ul>
          </div>
          <a href="/compare" class="nav-link-custom">COMPARE</a>
          <a href="/pages/why-barefoot" class="nav-link-custom">WHY BAREFOOT</a>
        </div>

        <!-- Right: Dropdown & Cart -->
        <div class="nav-right-custom">
          <div class="dropdown-custom-wrapper">
            <a href="#" class="nav-link-custom dropdown-trigger-custom" onclick="return false;">MORE <span class="chevron-down-custom">▼</span></a>
            <ul class="dropdown-menu-custom">
              <li><a href="/pages/help" class="dropdown-link-custom">Help</a></li>
              <li><a href="/pages/barefoot-science" class="dropdown-link-custom">Barefoot Science</a></li>
              <li><a href="/pages/blogs" class="dropdown-link-custom">Blog</a></li>
            </ul>
          </div>
          <a href="/cart" class="nav-link-custom">CART</a>
        </div>
      </div>
    </x-header>

    <!-- Main Content Panel (Only Scroll 3) -->
    <main>
      <section class="community-section" id="scroll-3">
        <div class="community-container">
          <!-- Left: Editorial Content Panel -->
          <div class="community-text-panel">
            <h2 class="community-headline">THE BAREFOOT<br>MOVEMENT</h2>
            <p class="community-subtitle">Meet runners, lifters, hikers, physios, coaches and the simply curious powering the barefoot movement.</p>
            <div class="community-cta-row">
              <a href="/pages/community" class="community-btn">Join Us</a>
              <a href="/collections/the-collection" class="community-btn">Explore Collection</a>
            </div>
          </div>
          
          <!-- Right: Community Video Mosaic Grid (Symmetrical 3x2 with Left Column Tall) -->
          <div class="community-video-panel">
            <!-- 1. Tall Left Column (Yellow shoe floating) -->
            <div class="community-video-tile">
              <video autoplay muted loop playsinline>
                <source src="user gif-3 silent.mp4" type="video/mp4">
              </video>
            </div>
            
            <!-- 2. Top Middle (Blue shoe standing) -->
            <div class="community-video-tile">
              <video autoplay muted loop playsinline>
                <source src="user gif-1 silent.mp4" type="video/mp4">
              </video>
            </div>
            
            <!-- 3. Top Right (Crosswalk shoes) -->
            <div class="community-video-tile">
              <video autoplay muted loop playsinline>
                <source src="user gif-2 silent.mp4" type="video/mp4">
              </video>
            </div>
            
            <!-- 4. Bottom Middle (White shoe walking) -->
            <div class="community-video-tile">
              <video autoplay muted loop playsinline>
                <source src="user gif-4 silent.mp4" type="video/mp4">
              </video>
            </div>
            
            <!-- 5. Bottom Right (Green shoes on rug) -->
            <div class="community-video-tile">
              <video autoplay muted loop playsinline>
                <source src="user gif-5 silent.mp4" type="video/mp4">
              </video>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
